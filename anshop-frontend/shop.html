<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AnShop - Shop</title>
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="style.css">
  <style>
    :root {
      --theme: var(--accent);
      --theme-dark: var(--accent-dark);
      --bg-soft: var(--surface-soft);
      --text-main: var(--text-strong);
      --text-muted: var(--text-secondary);
      --line: var(--line-soft);
      --shadow-hover: var(--shadow-strong);
    }

    .shop-hero {
      padding: 36px 80px 20px;
      background: linear-gradient(135deg, #fff8fb 0%, #ffeef4 56%, #ffe4ec 100%);
      border-bottom: 1px solid var(--line);
    }

    .shop-hero h1 {
      font-size: 38px;
      line-height: 46px;
      color: var(--text-main);
      margin-bottom: 6px;
    }

    .shop-hero p {
      margin: 0;
      color: var(--text-muted);
    }

    .shop-container {
      padding: 28px 80px 50px;
      background: linear-gradient(180deg, #fffafc 0%, #fff3f7 100%);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow-soft);
      min-height: calc(100vh - 140px);
    }

    .filter-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 12px;
      align-items: center;
    }

    .filter-label {
      font-size: 14px;
      font-weight: 700;
      color: #5e2d3b;
      margin-right: 2px;
    }

    .filter-btn {
      border: 1px solid var(--theme);
      background: #fff;
      color: var(--theme);
      padding: 9px 16px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .filter-btn:hover {
      background: #fff0f5;
    }

    .filter-btn.active {
      background: var(--theme);
      color: #fff;
      box-shadow: 0 8px 18px rgba(176, 43, 73, 0.22);
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 18px;
    }

    .product-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      box-shadow: var(--shadow-soft);
      display: flex;
      flex-direction: column;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .product-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
    }

    .product-image-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 12px;
      overflow: hidden;
      background: var(--bg-soft);
      margin-bottom: 10px;
      border: 1px solid #f3d5df;
    }

    .product-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .product-name {
      font-size: 16px;
      margin-bottom: 8px;
      color: var(--text-main);
      min-height: 40px;
    }

    .product-category {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 8px;
      text-transform: capitalize;
    }

    .product-price {
      font-size: 18px;
      color: var(--theme);
      font-weight: 700;
      margin-bottom: 8px;
    }

    .price-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .product-mrp {
      color: #8a757c;
      font-size: 13px;
      text-decoration: line-through;
    }

    .product-discount {
      color: #7dffb0;
      font-size: 13px;
      font-weight: 700;
      background: rgba(125, 255, 176, 0.14);
      border: 1px solid rgba(125, 255, 176, 0.26);
      border-radius: 999px;
      padding: 2px 8px;
    }

    .rating-delivery-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      gap: 8px;
    }

    .rating-badge {
      display: inline-block;
      background: linear-gradient(135deg, #8a1c2b 0%, #d65a7a 100%);
      color: #fff;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      padding: 4px 8px;
    }

    .delivery-note {
      color: var(--text-muted);
      font-size: 12px;
    }

    .add-cart-btn {
      margin-top: auto;
      border: none;
      color: #fff;
      padding: 10px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, box-shadow 0.2s ease;
    }

    .add-cart-btn:not(.go-cart-btn) {
      background: linear-gradient(135deg, #4b2b58 0%, #7b4f8f 100%);
    }

    .add-cart-btn:not(.go-cart-btn):hover {
      background: linear-gradient(135deg, #5a3368 0%, #9460aa 100%);
      box-shadow: 0 10px 20px rgba(90, 51, 104, 0.24);
    }

    .add-cart-btn.go-cart-btn {
      background: linear-gradient(135deg, #8f2740 0%, #c65373 100%);
    }

    .add-cart-btn.go-cart-btn:hover {
      background: linear-gradient(135deg, #a63250 0%, #df7390 100%);
      box-shadow: 0 10px 20px rgba(143, 39, 64, 0.24);
    }

    .cart-count-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 20px;
      height: 20px;
      margin-left: 6px;
      border-radius: 999px;
      background: #d64545;
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      padding: 0 6px;
    }

    .empty-state {
      text-align: center;
      background: #fff;
      border: 1px dashed #e5b6c6;
      color: #7a646c;
      border-radius: 12px;
      padding: 30px;
    }

    .status-message {
      margin-bottom: 14px;
      color: #6d5860;
      font-size: 14px;
      min-height: 22px;
    }

    .search-container {
      position: relative;
      margin-bottom: 24px;
      max-width: 500px;
    }

    .search-input-wrapper {
      display: flex;
      align-items: center;
      border: 2px solid var(--theme);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    .search-input {
      flex: 1;
      border: none;
      padding: 12px 16px;
      font-size: 16px;
      outline: none;
      color: var(--text-main);
    }

    .search-input::placeholder {
      color: #a0a9a6;
    }

    .search-icon {
      padding: 0 12px;
      color: var(--theme);
      font-size: 18px;
      cursor: pointer;
    }

    .autocomplete-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-top: 4px;
      max-height: 300px;
      overflow-y: auto;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
      z-index: 100;
      display: none;
    }

    .autocomplete-dropdown.show {
      display: block;
    }

    .autocomplete-item {
      padding: 12px 16px;
      cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
      color: var(--text-main);
      font-size: 14px;
      transition: background 0.15s ease;
    }

    .autocomplete-item:hover {
      background: #f5faf9;
    }

    .autocomplete-item.highlighted {
      background: #e6f5f2;
    }

    .autocomplete-item-name {
      font-weight: 500;
      margin-bottom: 3px;
    }

    .autocomplete-item-details {
      font-size: 12px;
      color: var(--text-muted);
    }

    @media (max-width: 900px) {
      .shop-hero,
      .shop-container {
        padding-left: 20px;
        padding-right: 20px;
      }

      .search-container {
        max-width: 100%;
      }
    }

    @media (max-width: 799px) {
      .products-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }
    }

    @media (max-width: 420px) {
      .products-grid {
        gap: 12px;
      }

      .product-card {
        padding: 11px;
      }
    }
  </style>
</head>
<body>
  <section id="header">
    <a href="#" id="logo"><h2>AnShop</h2></a>

    <div>
      <ul id="navbar">
        <li><a href="index.html">Home</a></li>
        <li><a class="active" href="shop.html">Shop</a></li>
        <li><a href="my-orders.html">My Orders</a></li>
        <li><a href="cart.html">My Cart <span id="cartCountBadge" class="cart-count-badge">0</span></a></li>
        <li class="more-menu-item">
          <button type="button" id="moreMenuToggle" class="more-menu-toggle" aria-label="Open more menu" aria-haspopup="true" aria-expanded="false">&#8942;</button>
          <div id="moreMenuDropdown" class="more-menu-dropdown" role="menu">
            <div id="authNavMenu" class="more-menu-auth"></div>
            <a href="admin.html" onclick="return openAdminPanel(event)" role="menuitem">Admin</a>
            <a href="about.html" role="menuitem">About</a>
            <a href="contact.html" role="menuitem">Contact</a>
          </div>
        </li>
      </ul>
    </div>
  </section>

  <section class="shop-hero">
    <h1>Shop Products</h1>
    <p>Explore products and add your favorites to cart.</p>
  </section>

  <section class="shop-container">
    <input type="text" name="username" autocomplete="username" tabindex="-1" aria-hidden="true" style="position:absolute; left:-9999px; width:1px; height:1px; opacity:0; pointer-events:none;">
    <input type="password" name="password" autocomplete="current-password" tabindex="-1" aria-hidden="true" style="position:absolute; left:-9999px; width:1px; height:1px; opacity:0; pointer-events:none;">

    <div class="search-container">
      <div class="search-input-wrapper">
        <input 
          type="text" 
          id="searchInput" 
          name="q"
          class="search-input" 
          placeholder="Search products by name, type, or department..."
          autocomplete="off"
          readonly
          onfocus="this.removeAttribute('readonly');"
          inputmode="search"
          autocapitalize="off"
          autocorrect="off"
          spellcheck="false"
        >
        <span class="search-icon" aria-hidden="true">&#128269;</span>
      </div>
      <div id="autocompleteDropdown" class="autocomplete-dropdown"></div>
    </div>

    <div class="filter-row">
      <span class="filter-label">Department:</span>
      <button class="filter-btn active" data-department="All">All</button>
      <button class="filter-btn" data-department="Men">Men</button>
      <button class="filter-btn" data-department="Women">Women</button>
      <button class="filter-btn" data-department="Unisex">Unisex</button>
    </div>

    <div class="filter-row" id="typeFiltersRow">
      <span class="filter-label">Product Type:</span>
      <button class="filter-btn active" data-type="All">All</button>
    </div>

    <p id="statusMessage" class="status-message"></p>
    <div id="productsGrid" class="products-grid"></div>
  </section>

  <footer class="footer">
    <p>&copy; <span id="year"></span> AnShop. All rights reserved.</p>
  </footer>

  <script src="dark-mode.js"></script>
  <script src="admin-modal.js"></script>
  <script src="header-menu.js"></script>
    <script src="runtime-config.js"></script>
  <script src="api-config.js"></script>
  <script src="auth-nav.js"></script>
  <script src="shop.js"></script>
</body>
</html>
