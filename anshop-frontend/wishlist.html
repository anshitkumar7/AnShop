<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AnShop | Wishlist</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="wishlist.css">
</head>
<body>
  <section id="header">
    <a href="index.html" id="logo"><h2>AnShop</h2></a>
    <div>
      <ul id="navbar">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="my-orders.html">My Orders</a></li>
        <li><a href="cart.html">My Cart <span id="cartCountBadge" class="cart-count-badge">0</span></a></li>
        <li class="more-menu-item">
          <button type="button" id="moreMenuToggle" class="more-menu-toggle" aria-label="Open more menu" aria-haspopup="true" aria-expanded="false">⋮</button>
          <div id="moreMenuDropdown" class="more-menu-dropdown" role="menu">
            <div id="authNavMenu" class="more-menu-auth"></div>
            <a href="admin.html" data-admin-link hidden aria-hidden="true" onclick="return openAdminPanel(event)" role="menuitem">Admin</a>
            <a href="about.html" role="menuitem">About</a>
            <a href="contact.html" role="menuitem">Contact</a>
          </div>
        </li>
      </ul>
    </div>
  </section>

  <section class="wishlist-page section-p1">
    <div class="wishlist-hero">
      <h1>My Wishlist</h1>
      <p>Your saved favorites in one premium space.</p>
    </div>

    <div class="wishlist-toolbar">
      <span id="wishlistSummary">0 item(s)</span>
      <a href="shop.html" class="wishlist-shop-link">Continue Shopping</a>
    </div>

    <div id="wishlistGrid" class="wishlist-grid"></div>
  </section>

  <nav class="mobile-bottom-nav" aria-label="Mobile bottom navigation">
    <a class="bottom-nav-item" href="index.html" aria-label="Home">
      <svg class="bottom-nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M3 10.8L12 3l9 7.8V21h-6.1v-6.5h-5.8V21H3z" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"></path>
      </svg>
    </a>
    <a class="bottom-nav-item" href="shop.html" aria-label="Search">
      <svg class="bottom-nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <circle cx="11" cy="11" r="6.7" fill="none" stroke="currentColor" stroke-width="1.9"></circle>
        <path d="M16.2 16.2L21 21" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"></path>
      </svg>
    </a>
    <a class="bottom-nav-item" href="cart.html" aria-label="Cart">
      <svg class="bottom-nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M3 4h2l2.2 9.2a2 2 0 0 0 2 1.5h7.8a2 2 0 0 0 1.9-1.4L21 7H7" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"></path>
        <circle cx="10" cy="19" r="1.6" fill="currentColor"></circle>
        <circle cx="17" cy="19" r="1.6" fill="currentColor"></circle>
      </svg>
      <span id="bottomCartCountBadge" class="bottom-cart-badge">0</span>
    </a>
    <a class="bottom-nav-item" href="my-orders.html" aria-label="My Orders">
      <svg class="bottom-nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M8 4h8" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"></path>
        <rect x="5" y="3" width="14" height="18" rx="2.2" fill="none" stroke="currentColor" stroke-width="1.9"></rect>
        <path d="M8 9h8M8 13h8M8 17h5" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"></path>
      </svg>
    </a>
    <a class="bottom-nav-item active" href="profile.html" aria-label="Profile">
      <svg class="bottom-nav-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <circle cx="12" cy="8" r="4" fill="none" stroke="currentColor" stroke-width="1.9"></circle>
        <path d="M4 21a8 8 0 0 1 16 0" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"></path>
      </svg>
    </a>
  </nav>

  <footer class="footer">
    <p>&copy; <span id="year"></span> AnShop. All rights reserved.</p>
  </footer>

  <script src="dark-mode.js"></script>
  <script src="admin-modal.js"></script>
  <script src="header-menu.js"></script>
    <script src="runtime-config.js"></script>
  <script src="api-config.js"></script>
  <script src="auth-nav.js"></script>
  <script src="wishlist.js"></script>
</body>
</html>
