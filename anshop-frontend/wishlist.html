<html lang="en">
<head>

  <title>AnShop | Wishlist</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="wishlist.css">
</head>
<body>
  <section id="header">
    <a href="index.html" id="logo"><h2>AnShop</h2></a>
    <div>
      <ul id="navbar">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="my-orders.html">My Orders</a></li>
        <li><a href="cart.html">My Cart <span id="cartCountBadge" class="cart-count-badge">0</span></a></li>
        <li class="more-menu-item">

            <a href="contact.html" role="menuitem">Contact</a>

  <script src="admin-modal.js"></script>

  <script src="wishlist.js"></script>
