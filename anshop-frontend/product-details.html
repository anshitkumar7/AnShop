<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AnShop | Product Details</title>
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="product-details.css">
</head>
<body>
  <section id="header">
    <a href="index.html" id="logo"><h2>AnShop</h2></a>
    <div>
      <ul id="navbar">
        <li><a href="index.html">Home</a></li>
        <li><a class="active" href="shop.html">Shop</a></li>
        <li><a href="my-orders.html">My Orders</a></li>
        <li><a href="cart.html">My Cart <span id="cartCountBadge" class="cart-count-badge">0</span></a></li>
        <li class="more-menu-item">
          <button type="button" id="moreMenuToggle" class="more-menu-toggle" aria-label="Open more menu" aria-haspopup="true" aria-expanded="false">⋮</button>
          <div id="moreMenuDropdown" class="more-menu-dropdown" role="menu">
            <div id="authNavMenu" class="more-menu-auth"></div>
            <a href="admin.html" onclick="return openAdminPanel(event)" role="menuitem">Admin</a>
            <a href="about.html" role="menuitem">About</a>
            <a href="contact.html" role="menuitem">Contact</a>
          </div>
        </li>
      </ul>
    </div>
  </section>

  <main class="details-page section-p1">
    <p class="breadcrumb"><a href="shop.html">Shop</a> / <span id="crumbProductName">Product</span></p>

    <section class="details-layout" id="productDetailsRoot">
      <div class="details-loading">Loading product details...</div>
    </section>

    <section class="details-section">
      <div class="details-section-head">
        <h2>Customer Reviews</h2>
      </div>
      <div class="reviews-grid" id="reviewsGrid"></div>
    </section>

    <section class="details-section">
      <div class="details-section-head">
        <h2>Related Products</h2>
        <a href="shop.html">View all</a>
      </div>
      <div class="related-grid" id="relatedGrid"></div>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; <span id="year"></span> AnShop. All rights reserved.</p>
  </footer>

  <script src="dark-mode.js"></script>
  <script src="admin-modal.js"></script>
  <script src="header-menu.js"></script>
    <script src="runtime-config.js"></script>
  <script src="api-config.js"></script>
  <script src="auth-nav.js"></script>
  <script src="product-details.js"></script>
</body>
</html>
