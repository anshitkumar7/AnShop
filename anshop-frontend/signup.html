<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AnShop Register</title>
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="style.css">
  <style>
    .auth-page {
      min-height: calc(100vh - 90px);
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 14% 14%, rgba(214, 90, 122, 0.16), transparent 36%), radial-gradient(circle at 84% 10%, rgba(176, 43, 73, 0.11), transparent 34%), linear-gradient(155deg, #fff8fa 0%, #fff1f5 52%, #ffe8ef 100%);
      padding: 24px;
    }

    .auth-card {
      width: 100%;
      max-width: 450px;
      background: color-mix(in srgb, #ffffff 88%, transparent);
      border: 1px solid rgba(214, 90, 122, 0.28);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 18px 36px rgba(108, 30, 56, 0.12);
      backdrop-filter: blur(14px);
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }

    .auth-card::before {
      content: "";
      position: absolute;
      inset: -85%;
      background: linear-gradient(110deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.2) 45%, rgba(255, 255, 255, 0) 100%);
      transform: rotate(12deg);
      pointer-events: none;
      animation: authGlassSheen 6s ease-in-out infinite;
      z-index: 0;
    }

    .auth-card::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      border: 1px solid rgba(255, 255, 255, 0.48);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.3);
      pointer-events: none;
      z-index: 0;
    }

    .auth-card > * {
      position: relative;
      z-index: 1;
    }

    .auth-card h2 {
      font-size: clamp(30px, 3.2vw, 36px);
      margin-bottom: 10px;
      line-height: 1.15;
      color: #281318;
    }

    .auth-card p {
      margin: 0 0 16px;
      font-size: 15px;
      color: #70555d;
    }

    .auth-form {
      display: grid;
      gap: 14px;
    }

    .auth-form input,
    .auth-form button {
      width: 100%;
      padding: 12px 13px;
      border-radius: 10px;
      border: 1px solid var(--border-color);
      font-size: 15px;
    }

    .auth-form input {
      background: #fffafc;
      color: #2a171d;
      border-color: rgba(214, 90, 122, 0.32);
    }

    .auth-form input::placeholder {
      color: #8a7079;
      opacity: 1;
    }

    .auth-form input:focus {
      outline: none;
      border-color: rgba(176, 43, 73, 0.58);
      box-shadow: 0 0 0 3px rgba(214, 90, 122, 0.16);
      background: #ffffff;
    }

    .auth-form button {
      border: none;
      background: linear-gradient(135deg, var(--accent-dark) 0%, var(--accent) 100%);
      color: #ffffff;
      font-weight: 700;
      letter-spacing: 0.01em;
      cursor: pointer;
    }

    .auth-form button:hover {
      background: linear-gradient(135deg, var(--accent) 0%, color-mix(in srgb, var(--accent) 72%, #ffffff) 100%);
    }

    .auth-status {
      margin-top: 8px;
      font-size: 15px;
      min-height: 20px;
      color: #70555d;
    }

    .auth-link {
      margin-top: 10px;
      color: #b02b49;
      font-size: 15px;
    }

    .auth-link a {
      color: #b02b49;
      font-weight: 700;
      text-decoration: none;
    }

    .auth-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 12px 0;
      color: #8b6d76;
      font-size: 13px;
      font-weight: 700;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: rgba(176, 43, 73, 0.25);
    }

    .google-wrap {
      border: 1px solid rgba(214, 90, 122, 0.3);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.82);
      padding: 10px;
    }

    .google-caption {
      margin: 0 0 8px;
      color: #7d5f68;
      font-size: 13px;
      text-align: center;
    }

    #googleSignInWrap {
      display: flex;
      justify-content: center;
      min-height: 40px;
    }

    .google-login-btn {
      width: 100%;
      max-width: 300px;
      border: 1px solid rgba(214, 90, 122, 0.32);
      border-radius: 999px;
      padding: 10px 14px;
      background: #ffffff;
      color: #49323a;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .google-login-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(176, 43, 73, 0.55);
      box-shadow: 0 10px 18px rgba(176, 43, 73, 0.14);
    }

    .google-login-btn::before {
      content: "G";
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4285f4 0%, #ea4335 50%, #fbbc05 75%, #34a853 100%);
      color: #ffffff;
      font-size: 12px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    body.dark-mode .auth-page {
      background: radial-gradient(circle at 18% 16%, rgba(214, 90, 122, 0.2), transparent 38%), radial-gradient(circle at 86% 12%, rgba(138, 28, 43, 0.24), transparent 34%), linear-gradient(160deg, #09090a 0%, #140f12 56%, #0a0a0a 100%) !important;
    }

    body.dark-mode .auth-card {
      background: linear-gradient(145deg, rgba(22, 18, 21, 0.92) 0%, rgba(14, 12, 14, 0.92) 100%) !important;
      border-color: rgba(214, 90, 122, 0.32) !important;
      box-shadow: 0 20px 36px rgba(0, 0, 0, 0.44), 0 0 22px rgba(138, 28, 43, 0.18) !important;
    }

    body.dark-mode .auth-card::after {
      border-color: rgba(214, 90, 122, 0.26);
      box-shadow: inset 0 0 0 1px rgba(214, 90, 122, 0.08);
    }

    body.dark-mode .auth-card h2 {
      color: #fff4f8 !important;
    }

    body.dark-mode .auth-card p,
    body.dark-mode .auth-status {
      color: #e3c2ce !important;
    }

    body.dark-mode .auth-form input {
      background: rgba(15, 14, 16, 0.95) !important;
      color: #f4e5ea !important;
      border-color: rgba(214, 90, 122, 0.34) !important;
    }

    body.dark-mode .auth-form input::placeholder {
      color: #ad8d97 !important;
    }

    body.dark-mode .auth-divider {
      color: #c8aeb7;
    }

    body.dark-mode .auth-divider::before,
    body.dark-mode .auth-divider::after {
      background: rgba(214, 90, 122, 0.36);
    }

    body.dark-mode .google-wrap {
      border-color: rgba(214, 90, 122, 0.34);
      background: rgba(16, 14, 16, 0.9);
    }

    body.dark-mode .google-caption {
      color: #c6a8b2;
    }

    body.dark-mode .google-login-btn {
      border-color: rgba(214, 90, 122, 0.36);
      background: rgba(20, 16, 19, 0.94);
      color: #f0dbe2;
    }

    @keyframes authGlassSheen {
      0% {
        transform: translateX(-120%) rotate(12deg);
        opacity: 0;
      }
      16% {
        opacity: 0.55;
      }
      44% {
        transform: translateX(230%) rotate(12deg);
        opacity: 0;
      }
      100% {
        transform: translateX(230%) rotate(12deg);
        opacity: 0;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .auth-card::before {
        animation: none;
      }
    }

    @media (max-width: 640px) {
      .auth-page {
        padding: 16px;
      }

      .auth-card {
        padding: 22px 18px;
        border-radius: 14px;
      }

      .auth-card p,
      .auth-status,
      .auth-link,
      .auth-form input,
      .auth-form button {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <section id="header">
    <a href="index.html" id="logo"><h2>AnShop</h2></a>

    <div>
      <ul id="navbar">
        <li><a href="index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="my-orders.html">My Orders</a></li>
        <li><a href="cart.html">My Cart</a></li>
        <li class="more-menu-item">
          <button type="button" id="moreMenuToggle" class="more-menu-toggle" aria-label="Open more menu" aria-haspopup="true" aria-expanded="false">&#8942;</button>
          <div id="moreMenuDropdown" class="more-menu-dropdown" role="menu">
            <div id="authNavMenu" class="more-menu-auth"></div>
            <a href="admin.html" onclick="return openAdminPanel(event)" role="menuitem">Admin</a>
            <a href="about.html" role="menuitem">About</a>
            <a href="contact.html" role="menuitem">Contact</a>
          </div>
        </li>
      </ul>
    </div>
  </section>

  <main class="auth-page">
    <section class="auth-card">
      <h2>Register</h2>
      <p>Create your AnShop account.</p>

      <form id="signupForm" class="auth-form">
        <input id="name" type="text" placeholder="Full Name" required>
        <input id="phone" type="tel" placeholder="Phone Number (optional)">
        <input id="email" type="email" placeholder="Email" required>
        <input id="password" type="password" placeholder="Password" required>
        <button type="submit">Create Account</button>
      </form>

      <div class="auth-divider">OR</div>
      <div class="google-wrap">
        <p class="google-caption">Continue with Google</p>
        <div id="googleSignInWrap"></div>
      </div>

      <p id="authStatus" class="auth-status"></p>
      <p class="auth-link">Already have account? <a href="login.html">Login</a></p>
    </section>
  </main>

  <script src="dark-mode.js"></script>
  <script src="admin-modal.js"></script>
  <script src="header-menu.js"></script>
  <script src="api-config.js"></script>
  <script src="google-config.js"></script>
  <script src="auth-nav.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script>
    const API = window.ANSHOP_API || {
      api: path => `${window.location.origin}/api/v1/${String(path || "").replace(/^\/+/, "")}`
    };
    const signupForm = document.getElementById("signupForm");
    const authStatus = document.getElementById("authStatus");
    const googleSignInWrap = document.getElementById("googleSignInWrap");
    const FIREBASE_CONFIG = window.__ANSHOP_FIREBASE_CONFIG__ || {};

    function persistAuth(data) {
      console.log("[persistAuth] Full response data:", data);
      console.log("[persistAuth] User data:", data.user);
      console.log("[persistAuth] PhotoURL from backend:", data.user.photoURL);
      
      localStorage.setItem("authToken", data.token);
      localStorage.setItem("userId", data.user._id);
      localStorage.setItem("userName", data.user.name || "User");
      localStorage.setItem("userEmail", data.user.email || "");
      localStorage.setItem("userRole", data.user.role || "user");
      localStorage.setItem("userPhotoURL", data.user.photoURL || "");
      
      console.log("[persistAuth] Saved to localStorage. PhotoURL now:", localStorage.getItem("userPhotoURL"));
    }

    signupForm.addEventListener("submit", async event => {
      event.preventDefault();

      const payload = {
        name: document.getElementById("name").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        email: document.getElementById("email").value.trim(),
        password: document.getElementById("password").value
      };

      authStatus.textContent = "Creating account...";

      try {
        const response = await fetch(API.api("users/signup"), {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!response.ok) {
          authStatus.textContent = data.message || "Signup failed";
          return;
        }

        if (data.user && data.user._id) {
          // ===== STEP 5: Store JWT token prominently =====
          persistAuth(data);
        }

        authStatus.textContent = "Account created successfully! Redirecting...";
        setTimeout(() => {
          window.location.href = "index.html";
        }, 800);
      } catch (error) {
        authStatus.textContent = "Could not signup. Please try again.";
      }
    });

    async function signUpWithGoogleFirebase() {
      if (!window.firebase || !window.firebase.auth) {
        authStatus.textContent = "Firebase SDK is not loaded.";
        console.error("Firebase SDK not loaded");
        return;
      }

      if (!FIREBASE_CONFIG || !FIREBASE_CONFIG.apiKey || !FIREBASE_CONFIG.projectId) {
        authStatus.textContent = "Google signup is not configured yet.";
        console.error("Firebase config missing", FIREBASE_CONFIG);
        return;
      }

      authStatus.textContent = "Creating account with Google...";

      try {
        if (!window.firebase.apps.length) {
          window.firebase.initializeApp(FIREBASE_CONFIG);
        }

        const provider = new window.firebase.auth.GoogleAuthProvider();
        provider.setCustomParameters({ prompt: "select_account" });

        const result = await window.firebase.auth().signInWithPopup(provider);
        const idToken = await result.user.getIdToken();
        const photoURL = result.user.photoURL || "";

        console.log("[signUpWithGoogleFirebase] Google photo URL from Firebase:", photoURL);
        console.log("[signUpWithGoogleFirebase] Full user object:", result.user);
        console.log("[signUpWithGoogleFirebase] Google token received, sending to backend...");

        const response = await fetch(API.api("users/google"), {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ idToken, photoURL })
        });

        const data = await response.json();
        console.log("[signUpWithGoogleFirebase] Backend response status:", response.status);
        console.log("[signUpWithGoogleFirebase] Backend response data:", data);

        if (!response.ok) {
          authStatus.textContent = data.message || "Google signup failed";
          console.error("Backend error:", data);
          return;
        }

        persistAuth(data);
        authStatus.textContent = "Google account ready! Redirecting...";
        setTimeout(() => {
          window.location.href = "index.html";
        }, 900);
      } catch (error) {
        console.error("Google signup error:", error);
        authStatus.textContent = error.message || "Could not signup with Google.";
      }
    }

    function initGoogleSignup() {
      if (!FIREBASE_CONFIG || !FIREBASE_CONFIG.apiKey || !FIREBASE_CONFIG.projectId) {
        googleSignInWrap.innerHTML = "<small>Google signup is not configured yet.</small>";
        return;
      }

      googleSignInWrap.innerHTML = '<button type="button" id="googleSignupBtn" class="google-login-btn">Continue with Google</button>';
      const googleBtn = document.getElementById("googleSignupBtn");
      if (googleBtn) {
        googleBtn.addEventListener("click", signUpWithGoogleFirebase);
      }
    }

    initGoogleSignup();
  </script>
</body>
</html>
